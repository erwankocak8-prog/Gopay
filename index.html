<!DOCTYPE html>
<html>
<head>
    <title>Error</title>
    <style>
        body {
            margin: 0;
            background-color: #0078D7;
            color: white;
            font-family: "Segoe UI", sans-serif;
        }
        .container {
            padding: 100px;
        }
        h1 {
            font-size: 80px;
            margin: 0;
        }
        p {
            font-size: 24px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>:(</h1>
    <p>Your PC ran into a problem and needs to restart.</p>
    <p>We're just collecting some error info, and then we'll restart for you.</p>
    <p id="progress">0% complete</p>
</div>

<script>
let percent = 0;
function loading() {
    if (percent <= 100) {
        document.getElementById("progress").innerText = percent + "% complete";
        percent++;
        setTimeout(loading, 80);
    }
}
loading();
</script>

</body>
</html>
